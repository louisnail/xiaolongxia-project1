  <!-- 主内容区 -->

      <!-- 评论区 -->

  <script>
    // ===== 文档数据库 =====
    // 在这里添加新文章/视频
    const docDatabase = {
      // 文章
      'install': {

        level: '⭐⭐ 进阶',

        date: '2026-03-10'
      },
      'skills': {
        type: 'article',
        title: 'Skills 开发',
        desc: '从0到1创建自定义Skills',
        file: 'docs/05-Skills 开发.html',
        tag: '📚 教程',
        level: '⭐⭐⭐ 高级',
        views: 750,
        likes: 189,
        comments: 21,
        date: '2026-03-10'
      },
      'cron': {
        type: 'article',
        title: '定时任务',
        desc: '配置Cron Jobs自动执行任务',
        file: 'docs/06-定时任务.html',
        tag: '📚 教程',
        level: '⭐⭐ 进阶',
        views: 620,
        likes: 156,
        comments: 18,
        date: '2026-03-10'
      },
      'token': {
        type: 'article',
        title: 'Token 优化',
        desc: '降低成本提升效率的实用技巧',
        file: 'docs/07-Token 优化.html',
        tag: '📚 教程',
        level: '⭐⭐ 进阶',
        views: 890,
        likes: 267,
        comments: 42,
        date: '2026-03-10'
      },
      'bestpractice': {
        type: 'article',
        title: '最佳实践',
        desc: 'OpenClaw使用经验和技巧总结',
        file: 'docs/08-最佳实践.html',
        tag: '📚 教程',
        level: '⭐⭐⭐ 高级',
        views: 1100,
        likes: 312,
        comments: 48,
        date: '2026-03-10'
      },
      // 视频
      'video-intro': {
        type: 'video',
        title: 'OpenClaw 入门介绍',
        desc: '10分钟了解OpenClaw核心功能',
        embedUrl: 'https://player.bilibili.com/player.html?bvid=BV1xxxxxx',
        tag: '🎬 视频',
        level: '⭐ 入门',
        views: 3500,
        likes: 890,
        comments: 120,
        date: '2026-03-10'
      },
      'video-11skills': {
        type: 'video',
        title: '11个Skill让你的龙虾真正武装起来',
        desc: '装了OpenClaw只会聊天？这11个必备Skill让你的AI助手真正强大起来',
        embedUrl: 'https://player.bilibili.com/player.html?bvid=BV1AwQ1YvE2V&page=1&high_quality=1&danmaku=0',
        tag: '🎬 视频',
        level: '⭐ 入门',
        views: 7748,
        likes: 156,
        comments: 25,
        date: '2026-03-10'
      }
    };
    
    // 当前文档ID
    let currentDocId = null;
    let currentDoc = null;
    
    // ===== 初始化 =====
    document.addEventListener('DOMContentLoaded', function() {
      // 获取URL参数
      const urlParams = new URLSearchParams(window.location.search);
      currentDocId = urlParams.get('id') || 'install';
      
      // 加载文档
      loadDocument(currentDocId);
      
      // 加载评论
      loadComments();
      
      // 初始化暗黑模式
      if (localStorage.getItem('darkMode') === 'true') {
        document.documentElement.classList.add('dark');
      }
    });
    
    // ===== 加载文档 =====
    async function loadDocument(docId) {
      currentDoc = docDatabase[docId];
      
      if (!currentDoc) {
        showError('文档不存在');
        return;
      }
      
      // 更新页面信息
      document.getElementById('docTitle').textContent = currentDoc.title;
      document.getElementById('docDesc').textContent = currentDoc.desc;
      document.getElementById('docTag').textContent = currentDoc.tag;
      document.getElementById('docLevel').textContent = currentDoc.level;
      document.getElementById('viewCount').textContent = currentDoc.views + ' 阅读';
      document.getElementById('likeCount').textContent = currentDoc.likes;
      document.getElementById('likeCountDisplay').textContent = currentDoc.likes + ' 点赞';
      document.getElementById('commentCount').textContent = currentDoc.comments + ' 评论';
      document.getElementById('commentCountDisplay').textContent = currentDoc.comments;
      document.getElementById('publishDate').textContent = currentDoc.date + ' 发布';
      
      // 加载内容
      const viewer = document.getElementById('contentViewer');
      
      if (currentDoc.type === 'article') {
        // 加载HTML文章
        try {
          const response = await fetch(currentDoc.file);
          if (response.ok) {
            const html = await response.text();
            // 提取body内容
            const bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
            const bodyContent = bodyMatch ? bodyMatch[1] : html;
            viewer.innerHTML = bodyContent;
            
            // 生成目录
            generateTOC();
          } else {
            throw new Error('加载失败');
          }
        } catch (error) {
          viewer.innerHTML = '<div class="p-8 text-center text-gray-500"><i class="fas fa-exclamation-circle text-4xl mb-4"></i><p>内容加载失败，请稍后重试</p></div>';
        }
      } else if (currentDoc.type === 'video') {
        // 加载视频
        viewer.innerHTML = `
          <div class="video-container">
            <iframe src="${currentDoc.embedUrl}" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>
          </div>
          <div class="mt-4 p-4 bg-gray-50 dark:bg-gray-800 rounded-lg">
            <p class="text-sm text-gray-600 dark:text-gray-400">视频简介：${currentDoc.desc}</p>
          </div>
        `;
      }
      
      // 加载相关推荐
      loadRelatedDocs(docId);
      
      // 恢复点赞状态
      const liked = localStorage.getItem('doc_' + docId + '_liked') === 'true';
      if (liked) {
        document.querySelector('.like-btn').classList.add('active');
      }
    }
    
    // ===== 生成目录 =====
    function generateTOC() {
      const toc = document.getElementById('toc');
      const headings = document.querySelectorAll('#contentViewer h2, #contentViewer h3');
      
      if (headings.length === 0) {
        toc.innerHTML = '<p class="text-sm text-gray-500">暂无目录</p>';
        return;
      }
      
      let tocHTML = '';
      headings.forEach((heading, index) => {
        const id = 'section' + (index + 1);
        heading.id = id;
        const isH2 = heading.tagName === 'H2';
        tocHTML += `
          <a href="#${id}" class="toc-item block px-3 py-2 rounded-lg text-sm ${isH2 ? 'font-medium' : 'pl-6'} text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" onclick="highlightTOC(this)">
            ${heading.textContent}
          </a>
        `;
      });
      
      toc.innerHTML = tocHTML;
    }
    
    // ===== 高亮目录 =====
    function highlightTOC(element) {
      document.querySelectorAll('.toc-item').forEach(item => item.classList.remove('active'));
      element.classList.add('active');
    }
    
    // ===== 加载相关推荐 =====
    function loadRelatedDocs(currentId) {
      const container = document.getElementById('relatedDocs');
      const related = Object.entries(docDatabase)
        .filter(([id, doc]) => id !== currentId && doc.type === currentDoc.type)
        .slice(0, 3);
      
      let html = '';
      related.forEach(([id, doc]) => {
        const icon = doc.type === 'video' ? 'fa-play-circle' : 'fa-file-alt';
        const color = doc.type === 'video' ? 'from-red-400 to-pink-400' : 'from-secondary to-blue-400';
        html += `
          <a href="doc-viewer.html?id=${id}" class="block group">
            <div class="flex items-start gap-3">
              <div class="w-12 h-12 rounded-lg bg-gradient-to-br ${color} flex items-center justify-center flex-shrink-0">
                <i class="fas ${icon} text-white"></i>
              </div>
              <div>
                <h4 class="font-medium text-gray-800 dark:text-white group-hover:text-primary transition-colors">${doc.title}</h4>
                <p class="text-xs text-gray-500">${doc.desc.substring(0, 20)}...</p>
              </div>
            </div>
          </a>
        `;
      });
      
      container.innerHTML = html || '<p class="text-sm text-gray-500">暂无相关推荐</p>';
    }
    
    // ===== 加载评论 =====
    function loadComments() {
      const comments = [
        { name: '张三', time: '2小时前', content: '非常详细的教程，帮助很大！', likes: 23 },
        { name: '李四', time: '5小时前', content: '写得很清楚，跟着做就成功了', likes: 15 }
      ];
      
      const container = document.getElementById('commentList');
      let html = '';
      comments.forEach(comment => {
        html += `
          <div class="flex gap-4">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-400 to-cyan-400 flex-shrink-0"></div>
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-1">
                <span class="font-medium text-gray-800 dark:text-white">${comment.name}</span>
                <span class="text-xs text-gray-500">${comment.time}</span>
              </div>
              <p class="text-gray-600 dark:text-gray-400">${comment.content}</p>
              <div class="flex items-center gap-4 mt-2 text-sm text-gray-500">
                <button class="hover:text-primary transition-colors">
                  <i class="fas fa-thumbs-up mr-1"></i>${comment.likes}
                </button>
                <button class="hover:text-primary transition-colors">回复</button>
              </div>
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }
    
    // ===== 暗黑模式切换 =====
    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
    }
    
    // ===== 点赞功能 =====
    function toggleLike(btn) {
      if (!currentDoc) return;
      
      const liked = btn.classList.contains('active');
      const likeCountEl = document.getElementById('likeCount');
      const likeCountDisplayEl = document.getElementById('likeCountDisplay');
      let count = parseInt(likeCountEl.textContent);
      
      if (liked) {
        btn.classList.remove('active');
        btn.innerHTML = `<i class="far fa-heart"></i><span>${count - 1}</span>`;
        likeCountDisplayEl.textContent = (count - 1) + ' 点赞';
        localStorage.setItem('doc_' + currentDocId + '_liked', 'false');
      } else {
        btn.classList.add('active');
        btn.innerHTML = `<i class="fas fa-heart"></i><span>${count + 1}</span>`;
        likeCountDisplayEl.textContent = (count + 1) + ' 点赞';
        localStorage.setItem('doc_' + currentDocId + '_liked', 'true');
      }
    }
    
    // ===== 分享功能 =====
    function shareDoc() {
      if (navigator.share) {
        navigator.share({
          title: currentDoc ? currentDoc.title : 'OpenClaw 文档',
          text: currentDoc ? currentDoc.desc : '',
          url: window.location.href
        });
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert('链接已复制到剪贴板');
      }
    }
    
    // ===== 提交评论 =====
    function submitComment() {
      alert('评论功能开发中...');
    }
    
    // ===== 登录弹窗 =====
    function showLoginModal() {
      alert('登录功能开发中...');
    }
    
    // ===== 显示错误 =====
    function showError(message) {
      document.getElementById('contentViewer').innerHTML = `
        <div class="p-8 text-center">
          <i class="fas fa-exclamation-circle text-4xl text-red-500 mb-4"></i>
          <p class="text-gray-600 dark:text-gray-400">${message}</p>
          <a href="index.html" class="mt-4 inline-block px-4 py-2 bg-primary text-white rounded-lg">返回首页</a>
        </div>
      `;
    }
    
    // ===== 阅读进度 =====
    window.addEventListener('scroll', function() {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = Math.round((scrollTop / docHeight) * 100);
      document.getElementById('readProgress').textContent = progress + '%';
      document.getElementById('progressBar').style.width = progress + '%';
    });
  </script>
</body>
